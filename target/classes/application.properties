spring.application.name=function_calling

# 阿里云百炼配置（使用 OpenAI 兼容接口）
aliyun.bailian.api-key=${ALI_API_KEY:your-api-key-here}
aliyun.bailian.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
aliyun.bailian.model-name=deepseek-v3

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/chatbi_demo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 日志配置
logging.level.root=INFO
logging.level.dev.langchain4j=DEBUG
logging.level.com.example.function_calling=DEBUG

# AI 安全配置
ai.security.allowed-url-prefixes=/dashboard,/reports,/analytics,/settings,/profile,/api/
ai.security.allowed-modal-ids=chart-modal,report-detail-modal,confirm-modal,settings-modal
ai.security.require-confirmation-for-dangerous-actions=true


spring.application.name=function_calling

# LangChain4j Community DashScope 配置（自动配置 ChatLanguageModel 和 StreamingChatLanguageModel）
langchain4j.community.dashscope.chat-model.api-key=${ALI_API_KEY:your-api-key-here}
langchain4j.community.dashscope.chat-model.model-name=deepseek-v3
langchain4j.community.dashscope.chat-model.temperature=0.7

# Streaming 模型配置（StreamingBiAgent 使用）
langchain4j.community.dashscope.streaming-chat-model.api-key=${ALI_API_KEY:your-api-key-here}
langchain4j.community.dashscope.streaming-chat-model.model-name=deepseek-v3
langchain4j.community.dashscope.streaming-chat-model.temperature=0.7

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/chatbi_demo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 日志配置
logging.level.root=INFO
logging.level.dev.langchain4j=DEBUG
logging.level.com.example.function_calling=DEBUG

# AI 安全配置
ai.security.allowed-url-prefixes=/dashboard,/reports,/analytics,/settings,/profile,/api/
ai.security.allowed-modal-ids=chart-modal,report-detail-modal,confirm-modal,settings-modal
ai.security.require-confirmation-for-dangerous-actions=true

